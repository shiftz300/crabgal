[workspace]
resolver = "2"
members = [
    "crates/*",
]
default-members = ["."]

[package]
name = "crabgal"
version.workspace = true
edition.workspace = true
description = "A dedicated visual-novel engine with WebGAL script compatibility"

[workspace.package]
version = "0.6.0"
edition = "2024"

# Disable icu_provider's debug eprintln! fallback in dev builds.
# Without this, icu_provider prints "ICU4X data error: ..." to stderr
# every frame when debug_assertions is enabled (dev profile default),
# even with the "logging" feature disabled.
[profile.dev.package.icu_provider]
debug-assertions = false

[workspace.dependencies]
crabgal-core = { path = "crates/core" }
crabgal-loader = { path = "crates/loader" }

log = "0.4"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"
crc32fast = "1"
notify = "7"
serde_yaml = "0.9"
hexz_k = { git = "https://github.com/maincoretech/hexz_k", rev = "4cf5287", default-features = false }
bevy = { version = "0.19", default-features = false }
libwebp-sys = "0.14.4"
futures-lite = "2"

[dependencies]
crabgal-core = { workspace = true }
crabgal-loader = { workspace = true }
log = { workspace = true }
bincode = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
libwebp-sys = { workspace = true }
futures-lite = { workspace = true }
bevy = { workspace = true, features = ["bevy_winit", "bevy_log", "bevy_render", "bevy_sprite", "bevy_ui", "bevy_ui_render", "bevy_audio", "wav", "mp3", "vorbis", "png", "jpeg"] }
