# crabgal game configuration
title: "crabgal Feature Lab"
title_background: "calibration_day.webp"
project:
  description: "A self-contained, numbered acceptance project for every WebGAL-adapter action and native visual effect."

# Sources are layered from low to high priority. The shared asset layer proves
# that scripts and media no longer need to live under one physical root.
adapter:
  asset:
    - path: "."
      format: fs
    - path: "content/shared"
      format: fs
  script: webgal
  store: crabgal

assets:
  bgm:
    calibration_bgm.opus: "audio/calibration_bgm.opus"
  voices:
    calibration_voice.opus: "audio/calibration_voice.opus"
  effects:
    calibration_effect.opus: "audio/calibration_effect.opus"
  videos:
    calibration_pan.mp4: "video/calibration_pan.mp4"

fonts:
  speaker_size: 39.0
  dialogue_size: 45.0
  icon_size: 19.5
  label_size: 18.0

styles:
  textbox_alpha: 0.72
  typewriter_speed: 45.0
  auto_delay: 2.0

layout:
  anchor_offset: 30
  sprite_height: 825
  textbox_left: 0.0
  textbox_dodge_left: 10.0
  textbox_bottom: 1.0
  textbox_height: 22.0
  namebar_bottom: 24.0
