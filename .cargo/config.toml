[alias]
dev = "run --features video-ffmpeg -- dev"
# Minimal runtime for machines without FFmpeg development libraries. Projects
# that contain video deliberately fail that capability at runtime instead of
# pretending playback succeeded.
dev-lite = "run -- dev"
# Optimized interactive preview. Keeping `--release` inside the alias avoids
# leaking Cargo's option ordering into the project-facing command line.
preview = "run --release --features video-ffmpeg -- dev"
# Repeatable release-mode runtime capture. The optional final argument is the
# sampling duration in seconds (default: 15, after a 3-second warm-up); a
# second optional argument selects the compiled action cursor. A final profile
# (`full`, `scene-ui`, `scene-dialog`, or `scene`) is reserved for measuring
# per-camera render overhead without changing normal runtime composition.
perf = "run --release --features video-ffmpeg -- benchmark"
# Studio owns authoring and persists its current fragment/block in the project.
# crabgal remains a separate native process and follows those files directly;
# no Studio extension, injected UI, localhost server or installation step.
studio-sync = "run --features video-ffmpeg -- studio"
studio-dev = "run --features video-ffmpeg -- studio"
studio-check = "run -- check"
studio-test = "test --workspace --all-targets --no-default-features"
studio-lint = "clippy --workspace --all-targets --no-default-features -- -D warnings"
validate = "run -- check"
# Backward-compatible name used by earlier local workflows.
parse = "run -- check"
